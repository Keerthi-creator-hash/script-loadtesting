name: Cleanup Old Pull Requests and Branches

on:
  # Scheduled trigger: Every Sunday at 00:00 UTC
  schedule:
  - cron: '*/5 * * * *' 

  # Manual trigger
  workflow_dispatch:
    inputs:
      cutoffMinutes:
        description: 'PR & branch cutoff age in minutes'
        required: true
        default: '5'

permissions:
  contents: write
  pull-requests: write

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Scheduled run info
        if: github.event_name == 'schedule'
        run: |
          echo "Scheduled cleanup run (Sunday)"
          echo "Time (UTC): $(date -u)"

      - name: Manual run info
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "Manual cleanup run"
          echo "Cutoff minutes: ${{ github.event.inputs.cutoffMinutes }}"

      - name: Close old PRs and delete branches
        uses: actions/github-script@v7
        env:
          PR_CUTOFF_MINUTES: ${{ github.event.inputs.cutoffMinutes || vars.PR_CUTOFF_MINUTES || '5' }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            console.log('Cleanup job started at:', new Date().toISOString());

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const cutoffMinutes = parseInt(process.env.PR_CUTOFF_MINUTES, 10);
            const cutoffTime = new Date();
            cutoffTime.setMinutes(cutoffTime.getMinutes() - cutoffMinutes);

            console.log(`Using cutoff time: ${cutoffTime.toISOString()}`);

