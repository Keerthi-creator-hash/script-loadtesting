name: Cleanup Old Pull Requests and Branches

on:
  # Scheduled trigger: Every Sunday at 00:00 UTC
  schedule:
    - cron: '0 0 * * 0'

  # Manual trigger
  workflow_dispatch:
    inputs:
      cutoffDays:
        description: 'PR & branch cutoff age in days'
        required: false
        default: '90'

permissions:
  contents: write
  pull-requests: write

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Scheduled run info
        if: github.event_name == 'schedule'
        run: |
          echo "Scheduled cleanup run (Sunday)"
          echo "Time (UTC): $(date -u)"

      - name: Manual run info
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "Manual cleanup run"
          echo "Cutoff days: ${{ github.event.inputs.cutoffDays }}"

      - name: Close old PRs and delete branches
        uses: actions/github-script@v7
        env:
          PR_CUTOFF_DAYS: ${{ github.event.inputs.cutoffDays || '90' }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            console.log('Cleanup job started at:', new Date().toISOString());

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const cutoffDays = parseInt(process.env.PR_CUTOFF_DAYS, 10);
            const cutoffTime = new Date();
            cutoffTime.setDate(cutoffTime.getDate() - cutoffDays);

            console.log(`Cutoff time: ${cutoffTime.toISOString()}`);

            // ================= Counters =================
            let prsClosed = 0;
            let branchesDeleted = 0;

            const prOutcomes = [];
            const branchOutcomes = [];

            // ================= Protected branches =================
            const protectedSet = new Set(['main', 'master', 'develop']);

            try {
              const protectedBranches = await github.paginate(
                github.rest.repos.listBranches,
                { owner, repo, protected: true }
              );
              protectedBranches.forEach(b => protectedSet.add(b.name));
            } catch (e) {
              console.log('WARNING: Could not fetch protected branches:', e.message);
            }

            console.log('Protected branches:', Array.from(protectedSet).join(', '));

            // ================= Fetch open PRs =================
            const prs = await github.paginate(
              github.rest.pulls.list,
              { owner, repo, state: 'open', per_page: 100 }
            );

            console.log(`Found ${prs.length} open PR(s)`);

            // ================= Process PRs =================
            for (const pr of prs) {
              const prNumber = pr.number;
              const createdAt = new Date(pr.created_at);
              const baseBranch = pr.base.ref;
              const headBranch = pr.head.ref;

              // ---- PR too new ----
              if (createdAt > cutoffTime) {
                prOutcomes.push({
                  pr: prNumber,
                  status: 'SKIPPED',
                  reason: `PR created at ${createdAt.toISOString()} is newer than cutoff`
                });
                continue;
              }

              // ---- Base branch not protected ----
              if (!protectedSet.has(baseBranch)) {
                prOutcomes.push({
                  pr: prNumber,
                  status: 'SKIPPED',
                  reason: `Base branch "${baseBranch}" is not protected`
                });
                continue;
              }

              // ---- Close PR ----
              try {
                await github.rest.pulls.update({
                  owner,
                  repo,
                  pull_number: prNumber,
                  state: 'closed',
                });

                prsClosed++;
                prOutcomes.push({
                  pr: prNumber,
                  status: 'CLOSED',
                  reason: 'PR older than cutoff and targets protected branch'
                });

                console.log(`Closed PR #${prNumber}`);
              } catch (err) {
                prOutcomes.push({
                  pr: prNumber,
                  status: 'FAILED',
                  reason: `Failed to close PR: ${err.message}`
                });
                continue;
              }

              // ================= Branch handling =================

              // ---- Protected branch ----
              if (protectedSet.has(headBranch)) {
                branchOutcomes.push({
                  branch: headBranch,
                  status: 'SKIPPED',
                  reason: 'Branch is protected'
                });
                continue;
              }

              // ---- Fork branch ----
              if (pr.head.repo.fork) {
                branchOutcomes.push({
                  branch: headBranch,
                  status: 'SKIPPED',
                  reason: 'Branch belongs to a fork'
                });
                continue;
              }

              try {
                const branch = await github.rest.repos.getBranch({
                  owner,
                  repo,
                  branch: headBranch,
                });

                const lastCommitDate =
                  new Date(branch.data.commit.commit.committer.date);

                if (lastCommitDate > cutoffTime) {
                  branchOutcomes.push({
                    branch: headBranch,
                    status: 'SKIPPED',
                    reason: `Last commit at ${lastCommitDate.toISOString()} is newer than cutoff`
                  });
                  continue;
                }

                await github.rest.git.deleteRef({
                  owner,
                  repo,
                  ref: `heads/${headBranch}`,
                });

                branchesDeleted++;
                branchOutcomes.push({
                  branch: headBranch,
                  status: 'DELETED',
                  reason: 'Branch inactive and PR closed'
                });

                console.log(`Deleted branch: ${headBranch}`);
              } catch (err) {
                branchOutcomes.push({
                  branch: headBranch,
                  status: 'FAILED',
                  reason: `Failed to delete branch: ${err.message}`
                });
              }
            }

            // ================= Final Summary =================
            console.log('\n========== CLEANUP SUMMARY ==========');
            console.log(`PRs closed successfully: ${prsClosed}`);
            console.log(`Branches deleted successfully: ${branchesDeleted}`);

            console.log('\nPR results:');
            prOutcomes.forEach(o =>
              console.log(`- PR #${o.pr} [${o.status}]: ${o.reason}`)
            );

            console.log('\nBranch results:');
            branchOutcomes.forEach(o =>
              console.log(`- ${o.branch} [${o.status}]: ${o.reason}`)
            );

            console.log('====================================');
            console.log('Cleanup job completed');
