name: Cleanup Old Pull Requests and Branches

on:
  # Scheduled trigger: Every Sunday at 00:00 UTC
  schedule:
    - cron: '0 0 * * 0'

  # Manual trigger
  workflow_dispatch:
    inputs:
      cutoffDays:
        description: 'PR & branch cutoff age in days'
        required: true
        default: '90'

permissions:
  contents: write
  pull-requests: write

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Scheduled run info
        if: github.event_name == 'schedule'
        run: |
          echo "Scheduled cleanup run (Sunday)"
          echo "Time (UTC): $(date -u)"

      - name: Manual run info
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "Manual cleanup run"
          echo "Cutoff days: ${{ github.event.inputs.cutoffDays }}"

      - name: Close old PRs and delete branches
        uses: actions/github-script@v7
        env:
          PR_CUTOFF_DAYS: ${{ github.event.inputs.cutoffDays || '90' }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            console.log('Cleanup job started at:', new Date().toISOString());

            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const cutoffDays = parseInt(process.env.PR_CUTOFF_DAYS, 10);
            const cutoffTime = new Date();
            cutoffTime.setDate(cutoffTime.getDate() - cutoffDays);

            console.log(`Using cutoff time: ${cutoffTime.toISOString()}`);

            // ===== Counters =====
            let prsClosed = 0;
            let branchesDeleted = 0;

            const prFailures = [];
            const branchFailures = [];

            // ===== Protected branches =====
            const protectedSet = new Set(['main', 'master', 'develop']);

            try {
              const protections = await github.paginate(
                github.rest.repos.listBranches,
                { owner, repo, protected: true }
              );
              protections.forEach(b => protectedSet.add(b.name));
            } catch (e) {
              console.log('Could not fetch protected branches:', e.message);
            }

            // ===== Fetch open PRs =====
            const prs = await github.paginate(
              github.rest.pulls.list,
              { owner, repo, state: 'open', per_page: 100 }
            );

            console.log(`Found ${prs.length} open PR(s)`);

            // ===== Process PRs =====
            for (const pr of prs) {
              const prNumber = pr.number;
              const createdAt = new Date(pr.created_at);
              const baseBranch = pr.base.ref;
              const headBranch = pr.head.ref;

              if (createdAt > cutoffTime) {
                prFailures.push({ pr: prNumber, reason: 'PR newer than cutoff' });
                continue;
              }

              if (!protectedSet.has(baseBranch)) {
                prFailures.push({
                  pr: prNumber,
                  reason: `Base branch "${baseBranch}" is not protected`
                });
                continue;
              }

              try {
                await github.rest.pulls.update({
                  owner,
                  repo,
                  pull_number: prNumber,
                  state: 'closed',
                });
                prsClosed++;
                console.log(`Closed PR #${prNumber}`);
              } catch (err) {
                prFailures.push({
                  pr: prNumber,
                  reason: err.message
                });
                continue;
              }

              if (protectedSet.has(headBranch)) {
                branchFailures.push({
                  branch: headBranch,
                  reason: 'Branch is protected'
                });
                continue;
              }

              if (pr.head.repo.fork) {
                branchFailures.push({
                  branch: headBranch,
                  reason: 'Branch belongs to a fork'
                });
                continue;
              }

              try {
                const branch = await github.rest.repos.getBranch({
                  owner,
                  repo,
                  branch: headBranch,
                });

                const lastCommitDate = new Date(
                  branch.data.commit.commit.committer.date
                );

                if (lastCommitDate > cutoffTime) {
                  branchFailures.push({
                    branch: headBranch,
                    reason: 'Branch has recent commits'
                  });
                  continue;
                }

                await github.rest.git.deleteRef({
                  owner,
                  repo,
                  ref: `heads/${headBranch}`,
                });

                branchesDeleted++;
                console.log(`Deleted branch: ${headBranch}`);
              } catch (err) {
                branchFailures.push({
                  branch: headBranch,
                  reason: err.message
                });
              }
            }

            // ===== Final Summary =====
            console.log('\n========== CLEANUP SUMMARY ==========');
            console.log(`PRs closed successfully: ${prsClosed}`);
            console.log(`Branches deleted successfully: ${branchesDeleted}`);

            if (prFailures.length > 0) {
              console.log('\nPR failures / skips:');
              prFailures.forEach(f =>
                console.log(`- PR #${f.pr}: ${f.reason}`)
              );
            }

            if (branchFailures.length > 0) {
              console.log('\nBranch failures / skips:');
              branchFailures.forEach(f =>
                console.log(`- ${f.branch}: ${f.reason}`)
              );
            }

            console.log('====================================');
            console.log('Cleanup job completed');
